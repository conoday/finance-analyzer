<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Outer rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- Inner shine overlay -->
  <rect width="40" height="20" rx="10" fill="url(#shine)"/>

  <!-- Digital card shape -->
  <rect x="7" y="13" width="26" height="17" rx="3.5" fill="white" fill-opacity="0.12"/>
  <rect x="7" y="13" width="26" height="17" rx="3.5" stroke="white" stroke-opacity="0.22" stroke-width="0.8"/>

  <!-- Card stripe -->
  <rect x="7" y="18" width="26" height="3.5" fill="white" fill-opacity="0.15"/>

  <!-- Tap/wave rings on card (NFC style) -->
  <path d="M31 20.5 C31 18.0 29.2 16 27 16" stroke="#34d399" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M32.8 20.5 C32.8 17.0 30.4 14.2 27 14" stroke="#34d399" stroke-width="1" stroke-linecap="round" fill="none" stroke-opacity="0.6"/>

  <!-- Chip square -->
  <rect x="10" y="16.5" width="5" height="4" rx="1" fill="url(#card)" fill-opacity="0.9"/>
  <line x1="12.5" y1="16.5" x2="12.5" y2="20.5" stroke="white" stroke-opacity="0.4" stroke-width="0.6"/>
  <line x1="10" y1="18.5" x2="15" y2="18.5" stroke="white" stroke-opacity="0.4" stroke-width="0.6"/>

  <!-- Upward arrow indicating growth / digital flow -->
  <path d="M17 10 L20 7 L23 10" stroke="#a7f3d0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="20" y1="7" x2="20" y2="12.5" stroke="#a7f3d0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
