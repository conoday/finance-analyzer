# render.yaml — Deploy FastAPI backend to Render.com (free tier)
# Docs: https://render.com/docs/render-yaml

services:
  - type: web
    name: finance-analyzer-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_ORIGINS
        # After Vercel gives you a URL (e.g. https://finance-analyzer.vercel.app),
        # update this value on the Render dashboard.
        value: "https://finance-analyzer.vercel.app"
