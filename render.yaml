# render.yaml — Deploy OprexDuit FastAPI backend to Render.com
# Docs: https://render.com/docs/render-yaml

services:
  - type: web
    name: oprexduit-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_ORIGINS
        # URL frontend Vercel — sesuaikan jika berubah
        value: "https://oprexduit.vercel.app"
      # Set nilai berikut di Render dashboard (JANGAN taruh secret di sini):
      # - key: SUPABASE_URL             (contoh: https://xxxx.supabase.co)
      # - key: SUPABASE_SERVICE_ROLE_KEY
      # - key: SUPABASE_JWT_SECRET      (Supabase -> Project Settings -> API -> JWT Secret)
      # - key: TELEGRAM_BOT_TOKEN
      # - key: TELEGRAM_WEBHOOK_SECRET
      # - key: CRON_SECRET
